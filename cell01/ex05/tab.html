<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exercise 05: Tab</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }
        td {
            padding: 20px;
            text-align: center;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <td style="background-color: lightblue;">
                Light Blue
            </td>
            
            <td style="background-color: lightcoral;">
                Light Coral
            </td>
        </tr>
    </table>

</body>
</html>
